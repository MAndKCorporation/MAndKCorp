<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - M AND K Corporation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="contact-section">
        <div class="container">
            <h2>Contact Us</h2>
            <p>Get in touch with M AND K Corporation. Fill out the form below or reach out instantly via WhatsApp.</p>
            
            <div class="contact-wrapper">
                <form action="https://formspree.io/f/your_formspree_id" method="POST" class="contact-form">
                    
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Your Email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="Your Phone Number">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="How can we help you?" required></textarea>
                    </div>

                    <input type="text" name="_gotcha" style="display:none">

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <a href="https://wa.me/27663577165?text=Hello%20M%20AND%20K%20Corporation,%20I%20would%20like%20to%20enquire%20about%20your%20services." 
       class="whatsapp-float" 
       target="_blank" 
       rel="noopener noreferrer">
        <i class="fab fa-whatsapp"></i>
        <span>WhatsApp Us</span>
    </a>

</body>
</html>
